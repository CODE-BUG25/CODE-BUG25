<svg width="900" height="340" viewBox="0 0 900 340" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="75%">
      <stop offset="0%" stop-color="#1a1035"/>
      <stop offset="55%" stop-color="#0d0821"/>
      <stop offset="100%" stop-color="#05030f"/>
    </radialGradient>
    <radialGradient id="sunGrad" cx="45%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#fff6d5"/>
      <stop offset="35%" stop-color="#ffd36b"/>
      <stop offset="70%" stop-color="#ff9d4d"/>
      <stop offset="100%" stop-color="#ff6b9d"/>
    </radialGradient>
    <radialGradient id="sunGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffb84d" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#ffb84d" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="mercury" cx="35%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#e8d9c8"/>
      <stop offset="100%" stop-color="#8c7a68"/>
    </radialGradient>
    <radialGradient id="venus" cx="35%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#ffe9c4"/>
      <stop offset="100%" stop-color="#d99a4e"/>
    </radialGradient>
    <radialGradient id="earth" cx="35%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#8fd3ff"/>
      <stop offset="55%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#1e3a8a"/>
    </radialGradient>
    <radialGradient id="mars" cx="35%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#ffb08a"/>
      <stop offset="100%" stop-color="#c1440e"/>
    </radialGradient>
    <radialGradient id="jupiter" cx="35%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#ffe9c9"/>
      <stop offset="55%" stop-color="#d9a066"/>
      <stop offset="100%" stop-color="#8a5a2e"/>
    </radialGradient>
    <radialGradient id="saturn" cx="35%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#fff3d6"/>
      <stop offset="100%" stop-color="#c9a45c"/>
    </radialGradient>
    <filter id="glow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <style>
      .orbit { fill: none; stroke: #ffffff; stroke-opacity: 0.14; stroke-width: 1; }
      .spin1 { transform-origin: 450px 170px; animation: spin 6s linear infinite; }
      .spin2 { transform-origin: 450px 170px; animation: spin 9s linear infinite; }
      .spin3 { transform-origin: 450px 170px; animation: spin 13s linear infinite; }
      .spin4 { transform-origin: 450px 170px; animation: spin 18s linear infinite; }
      .spin5 { transform-origin: 450px 170px; animation: spin 26s linear infinite; }
      .spin6 { transform-origin: 450px 170px; animation: spin 34s linear infinite; }
      @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
      .pulse { animation: pulse 3s ease-in-out infinite; }
      @keyframes pulse { 0%,100% { opacity: 0.55; } 50% { opacity: 0.9; } }
      .twinkle { animation: tw 2.4s ease-in-out infinite; }
      .twinkle2 { animation: tw 3.1s ease-in-out infinite 0.6s; }
      .twinkle3 { animation: tw 1.8s ease-in-out infinite 1.1s; }
      @keyframes tw { 0%,100% { opacity: 0.2; } 50% { opacity: 1; } }
    </style>
  </defs>

  <rect width="900" height="340" fill="url(#bgGrad)"/>

  <!-- stars -->
  <g fill="#ffffff">
    <circle class="twinkle" cx="40" cy="40" r="1.4"/>
    <circle class="twinkle2" cx="90" cy="90" r="1"/>
    <circle class="twinkle3" cx="150" cy="30" r="1.6"/>
    <circle class="twinkle" cx="220" cy="70" r="1"/>
    <circle class="twinkle2" cx="70" cy="180" r="1.3"/>
    <circle class="twinkle3" cx="30" cy="260" r="1"/>
    <circle class="twinkle" cx="120" cy="290" r="1.4"/>
    <circle class="twinkle2" cx="200" cy="250" r="1"/>
    <circle class="twinkle3" cx="750" cy="40" r="1.5"/>
    <circle class="twinkle" cx="800" cy="90" r="1"/>
    <circle class="twinkle2" cx="850" cy="50" r="1.3"/>
    <circle class="twinkle3" cx="820" cy="150" r="1"/>
    <circle class="twinkle" cx="860" cy="220" r="1.4"/>
    <circle class="twinkle2" cx="780" cy="270" r="1"/>
    <circle class="twinkle3" cx="720" cy="300" r="1.3"/>
    <circle class="twinkle" cx="650" cy="35" r="1"/>
    <circle class="twinkle2" cx="500" cy="20" r="1.2"/>
    <circle class="twinkle3" cx="380" cy="300" r="1"/>
    <circle class="twinkle" cx="470" cy="310" r="1.3"/>
    <circle class="twinkle2" cx="600" cy="290" r="1"/>
  </g>

  <!-- orbit paths -->
  <ellipse class="orbit" cx="450" cy="170" rx="55" ry="22"/>
  <ellipse class="orbit" cx="450" cy="170" rx="90" ry="36"/>
  <ellipse class="orbit" cx="450" cy="170" rx="130" ry="52"/>
  <ellipse class="orbit" cx="450" cy="170" rx="175" ry="70"/>
  <ellipse class="orbit" cx="450" cy="170" rx="225" ry="90"/>
  <ellipse class="orbit" cx="450" cy="170" rx="270" ry="108"/>

  <!-- sun -->
  <circle cx="450" cy="170" r="60" fill="url(#sunGlow)" class="pulse"/>
  <circle cx="450" cy="170" r="30" fill="url(#sunGrad)" filter="url(#glow)"/>

  <!-- Mercury -->
  <g class="spin1">
    <circle cx="505" cy="170" r="4" fill="url(#mercury)"/>
  </g>

  <!-- Venus -->
  <g class="spin2">
    <circle cx="540" cy="170" r="6" fill="url(#venus)"/>
  </g>

  <!-- Earth -->
  <g class="spin3">
    <circle cx="580" cy="170" r="7" fill="url(#earth)"/>
  </g>

  <!-- Mars -->
  <g class="spin4">
    <circle cx="625" cy="170" r="5.5" fill="url(#mars)"/>
  </g>

  <!-- Jupiter -->
  <g class="spin5">
    <circle cx="675" cy="170" r="13" fill="url(#jupiter)"/>
  </g>

  <!-- Saturn with ring -->
  <g class="spin6">
    <ellipse cx="720" cy="170" rx="20" ry="6" fill="none" stroke="#e8d5a0" stroke-width="2.5" stroke-opacity="0.85"/>
    <circle cx="720" cy="170" r="11" fill="url(#saturn)"/>
  </g>

  <text x="450" y="325" text-anchor="middle" font-family="Verdana, sans-serif" font-size="13" fill="#c9b8ff" opacity="0.75">explore. build. launch. 🚀</text>
</svg>
